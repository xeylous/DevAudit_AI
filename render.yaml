services:
  - type: web
    name: devaudit-backend
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false # You must set this manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: CLIENT_URL
        sync: false # e.g., https://your-frontend.vercel.app
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GITHUB_CALLBACK_URL
        sync: false # e.g., https://your-backend.onrender.com/api/auth/github/callback
      - key: GEMINI_API_KEY
        sync: false
